<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chorva Bozor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B1D14;
    --brown: #8B5A2B;
    --brown-dark: #6B4420;
    --gold: #D9A441;
    --gold-dark: #B8842A;
    --paper: #FBF7F0;
    --card: #FFFFFF;
    --line: #EAE0D0;
    --muted: #8A7A6A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .chips { display: flex; gap: 8px; padding: 12px 14px 4px; overflow-x: auto; }
  .chip {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    border: 1.5px solid var(--line); color: var(--ink); background: var(--card);
    cursor: pointer;
  }
  .chip.active { background: var(--brown); border-color: var(--brown); color: white; }

  .location-banner {
    margin: 10px 14px 0;
    background: #F0E4D0; border: 1.5px solid var(--gold); border-radius: 12px;
    padding: 10px 12px; font-size: 12.5px; font-weight: 700; color: var(--brown-dark);
    display: flex; align-items: center; gap: 8px; cursor: pointer;
  }

  .catalog-header { padding: 14px 16px 4px; }
  .catalog-header h2 { font-size: 20px; font-weight: 800; }
  .catalog-header .count { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px 40px; }
  .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--line); }
  .thumb { width: 100%; height: 120px; object-fit: cover; background: #EDE4D0; display: block; }
  .card-body { padding: 9px 10px 10px; display: flex; flex-direction: column; gap: 3px; }
  .card-body .name { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .card-body .meta-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .region-tag { font-size: 10px; font-weight: 600; color: var(--brown-dark); background: #F0E4D0; padding: 3px 7px; border-radius: 8px; }
  .price { font-size: 13px; font-weight: 800; }
  .btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .call-btn {
    flex: 1;
    background: var(--brown); color: white; border: none;
    border-radius: 10px; padding: 8px 0; font-size: 12px; font-weight: 700;
    text-align: center; text-decoration: none; display: block;
  }
  .nav-btn {
    flex: 1;
    background: var(--gold); color: var(--ink); border: none;
    border-radius: 10px; padding: 8px 0; font-size: 12px; font-weight: 700;
    text-align: center; text-decoration: none; display: block;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13.5px; line-height: 1.6; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13.5px; }

  /* Pastki tab navigatsiyasi */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--line);
    display: flex; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn-tab {
    flex: 1; text-align: center; padding: 8px 0;
    font-size: 11.5px; font-weight: 700; color: var(--muted);
    border: none; background: none; cursor: pointer;
  }
  .nav-btn-tab .icon { font-size: 20px; display: block; margin-bottom: 2px; }
  .nav-btn-tab.active { color: var(--brown); }
  body { padding-bottom: 64px; }

  /* Profil */
  .profile-list { padding: 12px 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .profile-card {
    background: var(--card); border-radius: 14px; border: 1px solid var(--line);
    display: flex; gap: 10px; padding: 10px;
  }
  .profile-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; background: #EDE4D0; flex-shrink: 0; }
  .profile-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .profile-info .p-name { font-size: 13px; font-weight: 700; }
  .profile-info .p-price { font-size: 12px; color: var(--muted); }
  .status-pill {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 20px; margin-top: 2px; width: fit-content;
  }
  .status-pill.pending { background: #F0E4D0; color: var(--gold-dark); }
  .status-pill.approved { background: #DDEEE0; color: #3F7A4F; }
  .status-pill.rejected { background: #F5DADA; color: #A33; }
  .status-pill.sold { background: #E0E0E0; color: #666; }
  .profile-actions { display: flex; gap: 6px; margin-top: 6px; }
  .profile-actions button {
    font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer;
  }
  .btn-sold { background: var(--gold); color: var(--ink); }
  .btn-delete { background: #F5DADA; color: #A33; }

  /* E'lon berish formasi */
  .form-wrap { padding: 14px 14px 20px; display: flex; flex-direction: column; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .form-group input[type="text"],
  .form-group input[type="tel"],
  .form-group textarea,
  .form-group select {
    border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 12px;
    font-family: 'Manrope', sans-serif; font-size: 13.5px; background: var(--card); color: var(--ink);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .cat-select-row { display: flex; gap: 8px; }
  .cat-option {
    flex: 1; text-align: center; padding: 10px 0; border-radius: 10px;
    border: 1.5px solid var(--line); font-size: 12.5px; font-weight: 700; background: var(--card);
  }
  .cat-option.selected { background: var(--brown); border-color: var(--brown); color: white; }
  .photo-upload-box {
    border: 2px dashed var(--line); border-radius: 12px; padding: 20px;
    text-align: center; color: var(--muted); font-size: 12.5px; font-weight: 600;
    position: relative; cursor: pointer;
  }
  .photo-upload-box img { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 8px; }
  .photo-upload-box input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .location-btn {
    border: 1.5px solid var(--gold); background: #F0E4D0; color: var(--brown-dark);
    border-radius: 10px; padding: 10px; font-size: 12.5px; font-weight: 700; text-align: center;
  }
  .location-btn.confirmed { background: #DDEEE0; border-color: #3F7A4F; color: #3F7A4F; }
  .submit-btn {
    background: var(--gold); color: var(--ink); border: none; border-radius: 12px;
    padding: 14px 0; font-size: 14.5px; font-weight: 800; margin-top: 4px;
  }
  .submit-btn:disabled { opacity: 0.5; }
  .form-msg { text-align: center; font-size: 12.5px; font-weight: 700; padding: 8px; border-radius: 10px; }
  .form-msg.success { background: #DDEEE0; color: #3F7A4F; }
  .form-msg.error { background: #F5DADA; color: #A33; }
</style>
</head>
<body>

  <div class="chips" id="chips">
    <div class="chip active" data-cat="all">Barchasi</div>
    <div class="chip" data-cat="🐄 Mol">🐄 Mol</div>
    <div class="chip" data-cat="🐑 Qo'y">🐑 Qo'y</div>
    <div class="chip" data-cat="🐐 Echki">🐐 Echki</div>
  </div>

  <div class="location-banner" id="locationBanner">📍 Joylashuvni yoqib, yaqin e'lonlarni ko'ring</div>

  <div class="catalog-header" id="catalogHeader">
    <h2>Mahsulotlar</h2>
    <div class="count" id="countLabel">Yuklanmoqda...</div>
  </div>

  <div class="grid" id="grid"></div>

  <!-- PROFIL SAHIFASI -->
  <div id="profileView" style="display:none;">
    <div class="catalog-header">
      <h2>👤 Mening e'lonlarim</h2>
      <div class="count" id="profileCount">Yuklanmoqda...</div>
    </div>
    <div class="profile-list" id="profileList"></div>
  </div>

  <!-- E'LON BERISH FORMASI -->
  <div id="createView" style="display:none;">
    <div class="catalog-header">
      <h2>➕ Yangi e'lon</h2>
      <div class="count">Chorva mollarini sotish uchun e'lon joylang</div>
    </div>
    <div class="form-wrap">

      <div class="form-group">
        <label>Turi</label>
        <div class="cat-select-row" id="formCatRow">
          <div class="cat-option" data-cat="🐄 Mol">🐄 Mol</div>
          <div class="cat-option" data-cat="🐑 Qo'y">🐑 Qo'y</div>
          <div class="cat-option" data-cat="🐐 Echki">🐐 Echki</div>
        </div>
      </div>

      <div class="form-group">
        <label>Rasm</label>
        <div class="photo-upload-box" id="photoBox">
          <span id="photoBoxText">📸 Rasmni tanlash uchun bosing</span>
          <img id="photoPreview" style="display:none;" alt="">
          <input type="file" accept="image/*" capture="environment" id="photoInput">
        </div>
      </div>

      <div class="form-group">
        <label>Tavsif (yoshi, jinsi, holati)</label>
        <textarea id="formDesc" placeholder="Masalan: 3 yoshli qorabayir sigir, sog'in"></textarea>
      </div>

      <div class="form-group">
        <label>Narx</label>
        <input type="text" id="formPrice" placeholder="Masalan: 14 mln so'm">
      </div>

      <div class="form-group">
        <label>Telefon</label>
        <input type="tel" id="formPhone" placeholder="+998 90 123 45 67">
      </div>

      <div class="form-group">
        <label>Joylashuv</label>
        <div class="location-btn" id="formLocationBtn">📍 Joylashuvni aniqlash</div>
      </div>

      <div id="formMsg"></div>

      <button class="submit-btn" id="submitBtn" disabled>✅ E'lonni yuborish</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn-tab active" id="tabCatalog" onclick="switchTab('catalog')">
      <span class="icon">🐄</span>Katalog
    </button>
    <button class="nav-btn-tab" id="tabCreate" onclick="switchTab('create')">
      <span class="icon">➕</span>E'lon berish
    </button>
    <button class="nav-btn-tab" id="tabProfile" onclick="switchTab('profile')">
      <span class="icon">👤</span>Profil
    </button>
  </div>

<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  const currentUserId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user
    ? tg.initDataUnsafe.user.id
    : null;

  let currentCategory = 'all';
  let userLat = null;
  let userLon = null;

  function switchTab(tab) {
    document.getElementById('tabCatalog').classList.toggle('active', tab === 'catalog');
    document.getElementById('tabCreate').classList.toggle('active', tab === 'create');
    document.getElementById('tabProfile').classList.toggle('active', tab === 'profile');

    document.getElementById('chips').style.display = tab === 'catalog' ? 'flex' : 'none';
    document.getElementById('locationBanner').style.display = tab === 'catalog' ? 'flex' : 'none';
    document.getElementById('catalogHeader').style.display = tab === 'catalog' ? 'block' : 'none';
    document.getElementById('grid').style.display = tab === 'catalog' ? 'grid' : 'none';

    document.getElementById('createView').style.display = tab === 'create' ? 'block' : 'none';
    document.getElementById('profileView').style.display = tab === 'profile' ? 'block' : 'none';

    if (tab === 'profile') loadProfile();
  }

  // ---------------- E'LON BERISH FORMASI ----------------
  let formCategory = null;
  let formPhotoFile = null;
  let formLat = null;
  let formLon = null;

  document.querySelectorAll('#formCatRow .cat-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('#formCatRow .cat-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      formCategory = opt.dataset.cat;
      checkFormValid();
    });
  });

  document.getElementById('photoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    formPhotoFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('photoBoxText').style.display = 'none';
      const preview = document.getElementById('photoPreview');
      preview.src = ev.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
    checkFormValid();
  });

  document.getElementById('formLocationBtn').addEventListener('click', () => {
    if (!navigator.geolocation) return;
    document.getElementById('formLocationBtn').textContent = '📍 Aniqlanmoqda...';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        formLat = pos.coords.latitude;
        formLon = pos.coords.longitude;
        const btn = document.getElementById('formLocationBtn');
        btn.textContent = '✅ Joylashuv aniqlandi';
        btn.classList.add('confirmed');
        checkFormValid();
      },
      () => {
        document.getElementById('formLocationBtn').textContent = '❌ Ruxsat berilmadi, qayta urinish';
      }
    );
  });

  ['formDesc', 'formPrice', 'formPhone'].forEach(id => {
    document.getElementById(id).addEventListener('input', checkFormValid);
  });

  function checkFormValid() {
    const desc = document.getElementById('formDesc').value.trim();
    const price = document.getElementById('formPrice').value.trim();
    const phone = document.getElementById('formPhone').value.trim();
    const valid = formCategory && formPhotoFile && formLat !== null && desc && price && phone;
    document.getElementById('submitBtn').disabled = !valid;
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const msgBox = document.getElementById('formMsg');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Yuborilmoqda...';

    const fd = new FormData();
    fd.append('telegram_id', currentUserId || '');
    fd.append('kategoriya', formCategory);
    fd.append('tavsif', document.getElementById('formDesc').value.trim());
    fd.append('narx', document.getElementById('formPrice').value.trim());
    fd.append('telefon', document.getElementById('formPhone').value.trim());
    fd.append('lat', formLat);
    fd.append('lon', formLon);
    fd.append('photo', formPhotoFile);

    try {
      const res = await fetch('/api/create-listing', { method: 'POST', body: fd });
      const result = await res.json();
      if (result.success) {
        msgBox.innerHTML = '<div class="form-msg success">✅ E\'loningiz yuborildi! Admin tekshirgach, katalogda chiqadi.</div>';
        resetForm();
      } else {
        msgBox.innerHTML = `<div class="form-msg error">Xatolik: ${result.error || 'nomalum xatolik'}</div>`;
      }
    } catch (e) {
      msgBox.innerHTML = '<div class="form-msg error">Internet xatoligi. Qayta urinib ko\'ring.</div>';
    }
    btn.textContent = '✅ E\'lonni yuborish';
    checkFormValid();
  });

  function resetForm() {
    formCategory = null;
    formPhotoFile = null;
    formLat = null;
    formLon = null;
    document.querySelectorAll('#formCatRow .cat-option').forEach(o => o.classList.remove('selected'));
    document.getElementById('formDesc').value = '';
    document.getElementById('formPrice').value = '';
    document.getElementById('formPhone').value = '';
    document.getElementById('photoInput').value = '';
    document.getElementById('photoBoxText').style.display = 'inline';
    document.getElementById('photoPreview').style.display = 'none';
    const btn = document.getElementById('formLocationBtn');
    btn.textContent = '📍 Joylashuvni aniqlash';
    btn.classList.remove('confirmed');
    document.getElementById('submitBtn').disabled = true;
  }

  async function loadProfile() {
    const list = document.getElementById('profileList');
    const countLabel = document.getElementById('profileCount');

    if (!currentUserId) {
      countLabel.textContent = '';
      list.innerHTML = '<div class="empty-state">Profilni ko\'rish uchun Mini App\'ni Telegram orqali oching.</div>';
      return;
    }

    list.innerHTML = '<div class="loading">Yuklanmoqda...</div>';

    try {
      const res = await fetch(`/api/my-listings?telegram_id=${currentUserId}`);
      const items = await res.json();

      countLabel.textContent = `${items.length} ta e'lon`;

      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state">Hali e\'lon joylamagansiz.<br>Botga qaytib, birinchi e\'loningizni qo\'shing!</div>';
        return;
      }

      list.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'profile-card';
        const showActions = item.status === 'approved';
        card.innerHTML = `
          <img class="profile-thumb" src="${item.photo_url}" alt="">
          <div class="profile-info">
            <div class="p-name">${item.tavsif}</div>
            <div class="p-price">${item.narx}</div>
            <span class="status-pill ${item.status}">${item.status_label}</span>
            ${showActions ? `
              <div class="profile-actions">
                <button class="btn-sold" onclick="markSold(${item.id})">✅ Sotildi</button>
                <button class="btn-delete" onclick="deleteListing(${item.id})">🗑️ O'chirish</button>
              </div>
            ` : ''}
          </div>
        `;
        list.appendChild(card);
      });
    } catch (e) {
      list.innerHTML = '<div class="empty-state">Xatolik yuz berdi.</div>';
    }
  }

  async function markSold(id) {
    if (!confirm('Bu e\'lonni "sotildi" deb belgilaysizmi?')) return;
    try {
      await fetch('/api/mark-sold', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, telegram_id: currentUserId }),
      });
      loadProfile();
    } catch (e) {
      alert('Xatolik yuz berdi.');
    }
  }

  async function deleteListing(id) {
    if (!confirm('E\'lonni butunlay o\'chirishni xohlaysizmi?')) return;
    try {
      await fetch('/api/delete-listing', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, telegram_id: currentUserId }),
      });
      loadProfile();
    } catch (e) {
      alert('Xatolik yuz berdi.');
    }
  }

  function requestLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        document.getElementById('locationBanner').textContent = '📍 Joylashuvingiz aniqlandi';
        loadListings();
      },
      () => {
        document.getElementById('locationBanner').textContent = '📍 Joylashuvga ruxsat berilmadi';
      }
    );
  }

  document.getElementById('locationBanner').addEventListener('click', requestLocation);

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentCategory = chip.dataset.cat;
      loadListings();
    });
  });

  async function loadListings() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Yuklanmoqda...</div>';

    let url = `/api/listings?kategoriya=${encodeURIComponent(currentCategory)}`;
    if (userLat !== null && userLon !== null) {
      url += `&lat=${userLat}&lon=${userLon}`;
    }

    try {
      const res = await fetch(url);
      const items = await res.json();

      document.getElementById('countLabel').textContent = `${items.length} ta e'lon`;

      if (items.length === 0) {
        grid.innerHTML = '<div class="empty-state">Hozircha e\'lon yo\'q.<br>Botga qaytib, birinchi bo\'lib e\'lon joylang!</div>';
        return;
      }

      grid.innerHTML = '';
      items.forEach(item => {
        const distanceText = item.distance_km !== null ? `📍 ${item.distance_km} km` : item.kategoriya;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="thumb" src="${item.photo_url}" alt="${item.tavsif}" loading="lazy">
          <div class="card-body">
            <div class="name">${item.tavsif}</div>
            <div class="meta-row">
              <span class="region-tag">${distanceText}</span>
              <span class="price">${item.narx}</span>
            </div>
            <div class="btn-row">
              <a class="call-btn" href="tel:${item.telefon}">📞 Qo'ng'iroq</a>
              <a class="nav-btn" href="https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}" target="_blank">🗺️ Yo'nalish</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Xatolik yuz berdi. Qayta urinib ko\'ring.</div>';
    }
  }

  loadListings();
</script>

</body>
</html>
